# civic topics — named presets for repeated research
# Run with: civic run <name>
# List with: civic topics

[topics.ai-regulation-federal]
topic = "AI regulation"
scope = "federal"
questions = [
    "What federal agencies are regulating AI?",
    "What AI-specific legislation is pending in Congress?",
    "How does the AI Action Plan affect agency rulemaking?"
]
output = "outputs/ai-regulation-federal.md"

[topics.ai-regulation-compare]
topic = "AI regulation"
compare = "federal,CA,NY,TX"
questions = [
    "How do state approaches differ from federal?",
    "Which states have enacted AI-specific laws?"
]
output = "outputs/ai-regulation-compare.md"

[topics.caregiver-federal]
topic = "family caregiver policy"
scope = "federal"
questions = [
    "What is the current status of the RAISE Family Caregivers Act?",
    "What CMS rules affect family caregiver reimbursement?",
    "What federal programs support unpaid caregivers?"
]
output = "outputs/caregiver-federal.md"

[topics.care-economy-states]
topic = "caregiver support policy"
compare = "CA,NY,MA,WA"
questions = [
    "Which states have paid family leave for caregiving?",
    "What state programs support elder care and child care?"
]
output = "outputs/care-economy-states.md"

[topics.chronic-disease-medicaid]
topic = "chronic disease management Medicaid policy"
scope = "federal"
questions = [
    "How does Medicaid reimburse chronic disease management?",
    "What CMS innovations target chronic care coordination?"
]
output = "outputs/chronic-disease-medicaid.md"

[topics.elder-care-workforce]
topic = "elder care workforce shortage"
scope = "all"
questions = [
    "What is the scale of the elder care workforce gap?",
    "What federal and state policies address care worker shortages?"
]
output = "outputs/elder-care-workforce.md"

# --- GiveCare domains ---

[topics.hcbs-waivers]
topic = "Medicaid home and community-based services HCBS waivers"
scope = "federal"
questions = [
    "What is the current status of the HCBS Access Rule?",
    "How are 1915(c) and 1915(k) waivers being used for home care?",
    "What CMS guidance affects HCBS spending and access?"
]
output = "outputs/hcbs-waivers.md"

[topics.dcw-wages]
topic = "direct care worker wages and benefits policy"
scope = "all"
questions = [
    "What federal minimum staffing or wage rules apply to home care workers?",
    "Which states have enacted direct care worker wage floors or bonuses?",
    "What is the current average wage for home health aides vs living wage?"
]
output = "outputs/dcw-wages.md"

[topics.caregiver-tax-credits]
topic = "family caregiver tax credits and financial support"
scope = "federal"
questions = [
    "What federal tax credits exist for family caregivers?",
    "What is the status of the Credit for Caring Act?",
    "How do dependent care FSAs and credits apply to elder care?"
]
output = "outputs/caregiver-tax-credits.md"

[topics.telehealth-caregivers]
topic = "telehealth policy for caregivers and home-based care"
scope = "federal"
questions = [
    "What CMS telehealth flexibilities remain post-COVID?",
    "How does Medicare reimburse remote patient monitoring for home care?",
    "What legislation extends telehealth access for rural caregivers?"
]
output = "outputs/telehealth-caregivers.md"

[topics.medicaid-hcbs-spending]
topic = "Medicaid HCBS spending and rebalancing"
compare = "federal,CA,NY,WA,MA"
questions = [
    "How much does each state spend on HCBS vs institutional care?",
    "Which states lead in Medicaid HCBS rebalancing?",
    "What federal incentives exist for shifting to home-based care?"
]
output = "outputs/medicaid-hcbs-spending.md"

# --- web-pulse policy feed (consumed by apps/web-pulse/scripts/pulse_wiki_ingest_civic.py) ---

[topics.pulse-policy-weekly]
topic = "caregiving policy, home-based care, paid family leave, direct care workforce"
scope = "all"
questions = [
    "What federal or state bills, rules, and filings this month materially affect family caregivers, paid leave, HCBS, or direct care workers?",
    "What new CMS or HHS guidance affects caregiver reimbursement or home-based care?",
    "Which state legislatures are advancing caregiver-relevant legislation right now?"
]
output = "outputs/pulse-policy-weekly.md"
